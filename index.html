<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS_KATALOG BARANG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --accent: #ffa000;
            --bg: #f1f8e9;
            --wa-green: #25D366;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        /* --- Header & Search --- */
        .header { text-align: center; margin-bottom: 20px; }
        .search-container { max-width: 500px; margin: 0 auto 20px; }
        input#search-input { 
            width: 100%; padding: 12px 20px; border-radius: 25px; 
            border: 2px solid var(--primary); outline: none; font-size: 16px;
        }

        /* --- Dropdown Filter System --- */
        .filter-group-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-dropdown { position: relative; }
        .filter-group-btn { 
            background: white; border: 2px solid var(--primary); color: var(--primary-dark);
            padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .filter-group-btn:hover { background: var(--primary); color: white; }
        
        .dropdown-content { 
            display: none; position: absolute; background: white; min-width: 180px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1000; border-radius: 12px; 
            padding: 10px; top: 120%; left: 50%; transform: translateX(-50%);
        }
        .dropdown-content.show { display: flex; flex-direction: column; gap: 8px; }
        .filter-btn { 
            border: none; padding: 10px; border-radius: 8px; cursor: pointer; 
            text-align: left; background: #f5f5f5; transition: 0.2s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: white; }

        /* --- Catalog Grid --- */
        .catalog-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; max-width: 1000px; margin: 0 auto; 
        }
        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; 
            text-align: center; transition: 0.3s; padding-bottom: 15px;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card h3 { font-size: 16px; margin: 15px 10px 5px; }
        .card p { font-size: 12px; color: #777; margin: 0; }

        /* --- Admin Panel --- */
        #admin-section { 
            background: white; padding: 25px; border-radius: 15px; 
            max-width: 500px; margin: 20px auto; border: 2px dashed var(--accent); 
        }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .admin-form input, .admin-form select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 12px; }

        /* --- Modal Detail --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow: auto; }
        .modal-content { 
            background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 450px; 
            border-radius: 20px; text-align: center; position: relative; animation: slideDown 0.3s;
        }
        @keyframes slideDown { from {transform: translateY(-50px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #888; }
        #modal-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .btn-wa { 
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--wa-green); color: white; padding: 12px 25px; 
            border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 15px; transition: 0.3s;
        }
        .btn-wa:hover { background: #1eb954; transform: scale(1.05); }

        /* --- Floating WA Button --- */
        .floating-wa {
            position: fixed; bottom: 25px; right: 25px; background: var(--wa-green);
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1500; text-decoration: none; font-size: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>GMS_KATALOG BARANG</h1>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Cari nama barang..." onkeyup="handleSearch(this.value)">
    </div>

    <div class="filter-group-container">
        <div class="filter-dropdown">
            <button class="filter-group-btn" onclick="toggleDropdown('umum')">📦 Material Umum ▼</button>
            <div id="dropdown-umum" class="dropdown-content">
                <button class="filter-btn active" onclick="filterCat('Semua', this)">Semua Barang</button>
                <button class="filter-btn" onclick="filterCat('Pipa', this)">Pipa</button>
                <button class="filter-btn" onclick="filterCat('Aksesoris', this)">Aksesoris</button>
                <button class="filter-btn" onclick="filterCat('Fitting', this)">Fitting</button>
            </div>
        </div>

        <div class="filter-dropdown">
            <button class="filter-group-btn" onclick="toggleDropdown('khusus')">💎 Material Khusus ▼</button>
            <div id="dropdown-khusus" class="dropdown-content">
                <button class="filter-btn" onclick="filterCat('Special Material', this)">Special Material</button>
            </div>
        </div>
        
        <button onclick="toggleAdminView()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:bold;">Mode Admin</button>
    </div>

    <div id="catalog-grid" class="catalog-grid"></div>

    <div id="admin-section" style="display:none;">
        <h3>Tambah Barang Baru</h3>
        <div class="admin-form">
            <input type="text" id="p-name" placeholder="Nama Barang">
            <input type="text" id="p-img" placeholder="Link Gambar (URL)">
            <select id="p-cat">
                <option value="Pipa">Pipa</option>
                <option value="Aksesoris">Aksesoris</option>
                <option value="Fitting">Fitting</option>
                <option value="Special Material">Special Material</option>
            </select>
            <button onclick="saveProduct()" style="background:var(--primary); color:white; padding:12px; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">Simpan ke Database</button>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="" alt="">
            <h2 id="modal-name"></h2>
            <p id="modal-cat"></p>
            <a id="whatsapp-link" href="#" target="_blank" class="btn-wa">
                Hubungi Admin via WA
            </a>
        </div>
    </div>

    <a href="https://wa.me/6282295977519" class="floating-wa" target="_blank" title="Chat Admin">💬</a>

    <script>
        // --- KONFIGURASI ---
        const SUPABASE_URL = "https://lqoynorzujcmzyynxmbw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_eODBvHQjNMS1sZgw_1usHA_yO8YEjLg";
        const WA_NUMBER = "6282295977519"; // Ganti dengan nomor Anda
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let items = [];
        let currentFilter = 'Semua';
        let searchQuery = '';

        async function loadData() {
            const { data, error } = await _supabase.from('products').select('*').order('id', { ascending: false });
            if (!error) { items = data; render(); }
        }

        function render() {
            const container = document.getElementById('catalog-grid');
            const isAdmin = document.getElementById('admin-section').style.display === 'block';
            container.innerHTML = "";

            const filtered = items.filter(item => {
                const matchCat = (currentFilter === 'Semua' || item.cat === currentFilter);
                const matchSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCat && matchSearch;
            });

            if(filtered.length === 0) { 
                container.innerHTML = `<div style="grid-column: 1/-1; padding: 50px; color: #888;">Barang tidak ditemukan...</div>`; 
                return; 
            }

            filtered.forEach(item => {
                container.innerHTML += `
                    <div class="card" onclick="showDetail('${item.name}', '${item.img}', '${item.cat}')">
                        <img src="${item.img || 'https://via.placeholder.com/200'}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                        <h3>${item.name}</h3>
                        <p>${item.cat}</p>
                        ${isAdmin ? `<button class="btn-del" onclick="event.stopPropagation(); deleteProduct(${item.id})">Hapus Barang</button>` : ''}
                    </div>
                `;
            });
        }

        // --- FILTER & SEARCH ---
        function toggleDropdown(id) {
            const current = document.getElementById('dropdown-' + id);
            const isShown = current.classList.contains('show');
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            if(!isShown) current.classList.add('show');
        }

        function filterCat(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function handleSearch(val) {
            searchQuery = val;
            render();
        }

        // --- MODAL & WA ---
        function showDetail(name, img, cat) {
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-img').src = img || 'https://via.placeholder.com/200';
            document.getElementById('modal-cat').innerText = "Kategori: " + cat;
            
            const msg = `Halo GMS, saya tertarik dengan produk: *${name}* (${cat}). Apakah stok tersedia?`;
            document.getElementById('whatsapp-link').href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
            
            document.getElementById('productModal').style.display = "block";
        }

        function closeModal() { document.getElementById('productModal').style.display = "none"; }

        // --- ADMIN FUNCTIONS ---
        function toggleAdminView() {
            const s = document.getElementById('admin-section');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
            render();
        }

        async function saveProduct() {
            const name = document.getElementById('p-name').value;
            const img = document.getElementById('p-img').value;
            const cat = document.getElementById('p-cat').value;
            if(!name) return alert("Minimal isi nama barang!");

            const { error } = await _supabase.from('products').insert([{ name, img, cat }]);
            if(!error) { 
                alert("Berhasil disimpan!"); 
                document.getElementById('p-name').value = ""; 
                document.getElementById('p-img').value = "";
                loadData(); 
            }
        }

        async function deleteProduct(id) {
            if(!confirm("Hapus barang ini secara permanen?")) return;
            const { error } = await _supabase.from('products').delete().eq('id', id);
            if(!error) loadData();
        }

        // Window Clicks
        window.onclick = function(e) {
            if(!e.target.matches('.filter-group-btn')) {
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            }
            if(e.target.className === 'modal') closeModal();
        }

        // Inisialisasi
        loadData();
    </script>
</body>
</html>
