<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Saya</title>
    <style>
        /* CSS Dasar untuk Tampilan */
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Memastikan gambar tidak gepeng */
        }

        .product-info { padding: 15px; }
        .product-price { color: #27ae60; font-weight: bold; font-size: 1.2em; }
        .product-desc { color: #666; font-size: 0.9em; margin: 10px 0; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Katalog Produk Kami</h1>

    <div class="catalog-container">
        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Produk 1">
            <div class="product-info">
                <h3>Kamera Mirrorless X</h3>
                <p class="product-desc">Kamera berkualitas tinggi dengan sensor full frame untuk fotografi profesional.</p>
                <p class="product-price">Rp 15.000.000</p>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300" alt="Produk 2">
            <div class="product-info">
                <h3>Headphone Noise Cancelling</h3>
                <p class="product-desc">Suara jernih dan fitur peredam bising yang sangat efektif untuk bekerja.</p>
                <p class="product-price">Rp 3.500.000</p>
            </div>
        </div>
    </div>

</body>
</html>
