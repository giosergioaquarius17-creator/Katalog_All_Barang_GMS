<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS_KATALOG BARANG</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #16a34a; 
            --primary-dark: #15803d;
            --whatsapp: #25d366;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 100%);
            --text: #14532d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0; padding: 20px; min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; }
        
        .header-container {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 35px; cursor: pointer;
        }

        .main-logo { height: 60px; width: auto; }

        h1 { 
            text-align: center; color: var(--primary-dark); font-weight: 900; 
            margin: 0; text-transform: uppercase; letter-spacing: 2px;
        }

        #adminPanel { 
            display: none; background: white; padding: 25px; border-radius: 20px; 
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }

        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; color: white; transition: 0.3s; }
        .btn-primary { background: var(--primary); width: 100%; }
        .btn-warning { background: var(--warning); margin-top: 10px; width: 100%; }
        .btn-danger { background: var(--danger); margin-top: 10px; width: 100%; }

        .filter-section { margin-bottom: 35px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border-radius: 50px; border: none; background: white; cursor: pointer; }
        .filter-btn.active { background: var(--primary); color: white; }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0fdf4; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card h3 { padding: 12px; margin: 0; font-size: 13px; text-align: center; text-transform: uppercase; color: var(--text); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5vh auto; border-radius: 20px; max-width: 450px; position: relative; overflow: hidden; }
        .modal-body { padding: 20px; }
        .modal-img { width: 100%; height: 250px; object-fit: contain; background: #f9f9f9; }
        .modal-desc-area { white-space: pre-wrap; background: #f1f5f9; padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 14px; color: #334155; }
        
        .btn-wa { background: var(--whatsapp); display: block; text-decoration: none; text-align: center; margin-top: 15px; padding: 12px; border-radius: 10px; color: white; font-weight: bold; }

        @media (max-width: 600px) {
            .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container" onclick="activateAdminMode()">
        <img src="gmslogo.png" alt="Logo" class="main-logo">
        <h1>GMS_KATALOG BARANG</h1>
    </div>

    <div id="adminPanel">
        <h3 id="formTitle">Tambah Produk Baru (Supabase)</h3>
        <div class="grid-form">
            <input type="text" id="p-name" placeholder="Nama Barang">
            <input type="text" id="p-img" placeholder="Nama File Gambar (contoh: male.jpg)">
            <select id="p-cat">
                <option value="Pipa">Pipa</option>
                <option value="Aksesoris">Aksesoris</option>
                <option value="Fitting">Fitting</option>
            </select>
            <textarea id="p-desc" style="height: 100px;" placeholder="Rincian harga & ukuran..."></textarea>
            <button id="saveBtn" class="btn btn-primary" onclick="addItem()">Simpan ke Database</button>
            <button id="cancelBtn" class="btn btn-danger" style="display:none;" onclick="resetForm()">Batal</button>
        </div>
    </div>

    <div class="filter-section">
        <button class="filter-btn active" onclick="filterCat('Semua', this)">Semua</button>
        <button class="filter-btn" onclick="filterCat('Pipa', this)">Pipa</button>
        <button class="filter-btn" onclick="filterCat('Aksesoris', this)">Aksesoris</button>
        <button class="filter-btn" onclick="filterCat('Fitting', this)">Fitting</button>
    </div>

    <div id="catalog-grid" class="catalog-grid"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <img id="modalImg" class="modal-img" src="">
        <div class="modal-body">
            <h2 id="modalName" style="margin:0;"></h2>
            <div id="modalDesc" class="modal-desc-area"></div>
            <a id="waBtn" href="#" target="_blank" class="btn btn-wa">💬 Tanya Admin / Order</a>
            
            <div id="adminActions" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                <button class="btn btn-warning" onclick="editItem()">Edit Data</button>
                <button class="btn btn-danger" onclick="deleteItem()">Hapus Produk</button>
            </div>
            <button class="btn" style="background:#666; width:100%; margin-top:10px;" onclick="closeModal()">Tutup</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI SUPABASE ---
    const SUPABASE_URL = 'https://lqoynorzujcmzyynxmbw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_eODBvHQjNMS1sZgw_1usHA_yO8YEjLg';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];
    let currentFilter = 'Semua';
    let isAdmin = false;
    let clickCount = 0;
    let currentItemId = null;
    let isEditing = false;

    function activateAdminMode() {
        clickCount++;
        if (clickCount === 5) {
            const pin = prompt("PIN Admin:");
            if (pin === "2020") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = "block";
                alert("Mode Admin Supabase Aktif!");
            }
            clickCount = 0;
        }
    }

    // Ambil Data dari Supabase
    async function fetchData() {
        const { data, error } = await _supabase.from('products').select('*');
        if (error) console.log('Error:', error);
        else {
            items = data;
            render();
        }
    }

    // Gantilah fungsi render Anda dengan ini
function render() {
    const container = document.getElementById('catalog-grid');
    container.innerHTML = "";
    const filtered = currentFilter === 'Semua' ? items : items.filter(i => i.cat === currentFilter);
    
    filtered.forEach((item) => {
        // Kita pastikan menggunakan item.id yang asli dari Supabase
        container.innerHTML += `
            <div class="card" onclick="openModal('${item.id}')">
                <img src="${item.img}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                <h3>${item.name}</h3>
            </div>`;
    });
}

// Gantilah fungsi openModal Anda dengan ini
function openModal(id) {
    currentItemId = id;
    // Mencari item berdasarkan ID string/angka yang unik
    const item = items.find(i => String(i.id) === String(id));
    
    if (item) {
        document.getElementById('modalImg').src = item.img;
        document.getElementById('modalName').innerText = item.name;
        document.getElementById('modalDesc').innerText = item.desc || "Hubungi admin untuk detail.";
        document.getElementById('waBtn').href = `https://wa.me/${NO_WHATSAPP}?text=Halo, saya tertarik dengan: *${item.name}*`;
        document.getElementById('adminActions').style.display = isAdmin ? "block" : "none";
        document.getElementById('productModal').style.display = "block";
    } else {
        console.error("Data produk tidak ditemukan untuk ID:", id);
    }
}

    async function addItem() {
        const name = document.getElementById('p-name').value;
        const img = document.getElementById('p-img').value;
        const cat = document.getElementById('p-cat').value;
        const desc = document.getElementById('p-desc').value;

        if(!name || !img) return alert("Isi nama & gambar!");

        if (isEditing) {
            await _supabase.from('products').update({ name, img, cat, desc }).eq('id', currentItemId);
        } else {
            await _supabase.from('products').insert([{ name, img, cat, desc }]);
        }
        
        fetchData();
        resetForm();
        alert("Berhasil disimpan!");
    }

    function editItem() {
        const item = items.find(i => i.id == currentItemId);
        isEditing = true;
        document.getElementById('p-name').value = item.name;
        document.getElementById('p-img').value = item.img;
        document.getElementById('p-cat').value = item.cat;
        document.getElementById('p-desc').value = item.desc;
        document.getElementById('formTitle').innerText = "Edit Produk";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
        closeModal();
    }

    async function deleteItem() {
        if(confirm("Hapus produk ini secara permanen?")) {
            await _supabase.from('products').delete().eq('id', currentItemId);
            fetchData();
            closeModal();
        }
    }

    function resetForm() {
        isEditing = false;
        currentItemId = null;
        ['p-name', 'p-img', 'p-desc'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('formTitle').innerText = "Tambah Produk Baru";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function openModal(id) {
        currentItemId = id;
        const item = items.find(i => i.id == id);
        document.getElementById('modalImg').src = item.img;
        document.getElementById('modalName').innerText = item.name;
        document.getElementById('modalDesc').innerText = item.desc;
        document.getElementById('waBtn').href = `https://wa.me/6282295977519?text=Halo, info: ${item.name}`;
        document.getElementById('adminActions').style.display = isAdmin ? "block" : "none";
        document.getElementById('productModal').style.display = "block";
    }

    function closeModal() { document.getElementById('productModal').style.display = "none"; }
    
    function filterCat(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    fetchData(); // Ambil data saat pertama kali buka
</script>
</body>
</html>
