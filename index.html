<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Pro - GitHub Pages</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Form & Filter Section */
        .panel { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        textarea { grid-column: span 2; height: 80px; }
        
        .btn { 
            background: var(--primary); color: white; border: none; padding: 12px 24px; 
            border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); margin-top: 10px; font-size: 12px; }

        /* Search & Category Filter */
        .filter-group { display: flex; gap: 10px; margin-bottom: 20px; }

        /* Catalog Grid */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-content { padding: 15px; }
        .category-badge { font-size: 10px; background: #e2e8f0; padding: 4px 8px; border-radius: 20px; text-transform: uppercase; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        
        @media (max-width: 600px) { .grid-form { grid-template-columns: 1fr; } textarea { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>My Digital Catalog</h1>

    <div class="panel">
        <h3>Tambah Item Baru</h3>
        <div class="grid-form">
            <input type="text" id="p-name" placeholder="Nama Produk">
            <input type="text" id="p-price" placeholder="Harga (Contoh: Rp 50.000)">
            <input type="text" id="p-img" placeholder="Folder/Nama Gambar (Contoh: images/sepatu.jpg)">
            <select id="p-cat">
                <option value="Umum">Pilih Kategori</option>
                <option value="Elektronik">Elektronik</option>
                <option value="Pakaian">Pakaian</option>
                <option value="Makanan">Makanan</option>
            </select>
            <textarea id="p-desc" placeholder="Deskripsi Singkat"></textarea>
            <button class="btn" style="grid-column: span 2;" onclick="addItem()">Simpan ke Katalog</button>
        </div>
    </div>

    <div class="filter-group">
        <input type="text" id="search" placeholder="Cari nama produk..." onkeyup="filterItems()">
        <select id="filter-cat" onchange="filterItems()" style="width: 200px;">
            <option value="Semua">Semua Kategori</option>
            <option value="Elektronik">Elektronik</option>
            <option value="Pakaian">Pakaian</option>
            <option value="Makanan">Makanan</option>
        </select>
    </div>

    <div id="catalog-grid" class="catalog-grid"></div>
</div>

<script>
    // Inisialisasi Data dari LocalStorage
    let items = JSON.parse(localStorage.getItem('catalog_db')) || [];

    // Fungsi Render Utama
    function render(data) {
        const container = document.getElementById('catalog-grid');
        container.innerHTML = data.length === 0 ? '<p>Tidak ada produk ditemukan.</p>' : '';

        data.forEach((item, index) => {
            container.innerHTML += `
                <div class="card">
                    <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300?text=Gambar+Error'">
                    <div class="card-content">
                        <span class="category-badge">${item.cat}</span>
                        <h3 style="margin: 10px 0 5px 0;">${item.name}</h3>
                        <p style="font-size: 13px; color: #64748b;">${item.desc}</p>
                        <div class="price">${item.price}</div>
                        <button class="btn btn-danger" onclick="deleteItem(${index})">Hapus Produk</button>
                    </div>
                </div>
            `;
        });
    }

    // Tambah Produk
    function addItem() {
        const newItem = {
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            img: document.getElementById('p-img').value,
            cat: document.getElementById('p-cat').value,
            desc: document.getElementById('p-desc').value
        };

        if(newItem.name && newItem.price && newItem.img) {
            items.push(newItem);
            saveAndRefresh();
            clearInputs();
        } else {
            alert("Harap isi Nama, Harga, dan Link Gambar!");
        }
    }

    // Filter & Search Logic
    function filterItems() {
        const searchVal = document.getElementById('search').value.toLowerCase();
        const catVal = document.getElementById('filter-cat').value;

        const filtered = items.filter(item => {
            const matchSearch = item.name.toLowerCase().includes(searchVal);
            const matchCat = (catVal === "Semua") || (item.cat === catVal);
            return matchSearch && matchCat;
        });

        render(filtered);
    }

    // Hapus Produk
    function deleteItem(index) {
        if(confirm("Hapus item ini?")) {
            items.splice(index, 1);
            saveAndRefresh();
        }
    }

    // Simpan Data
    function saveAndRefresh() {
        localStorage.setItem('catalog_db', JSON.stringify(items));
        render(items);
    }

    function clearInputs() {
        ['p-name', 'p-price', 'p-img', 'p-desc'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('p-cat').value = 'Umum';
    }

    // Load Pertama Kali
    render(items);
</script>

</body>
</html>
