<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS_KATALOG BARANG</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #16a34a; 
            --primary-dark: #15803d;
            --whatsapp: #25d366;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 100%);
            --text: #14532d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0; padding: 20px; min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; }

        /* --- HEADER & PENCARIAN --- */
        .header-container {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 25px; cursor: pointer;
        }
        .main-logo { height: 60px; width: auto; }
        h1 { text-align: center; color: var(--primary-dark); font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; }

        .search-container { max-width: 500px; margin: 0 auto 20px auto; }
        #searchInput { 
            width: 100%; padding: 15px 25px; border-radius: 50px; 
            border: 2px solid var(--primary); font-size: 16px; outline: none;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.1); box-sizing: border-box;
        }

        /* --- ADMIN PANEL --- */
        #adminPanel { 
            display: none; background: white; padding: 25px; border-radius: 20px; 
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }

        /* --- BUTTONS --- */
        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; color: white; transition: 0.3s; display: block; width: 100%; text-decoration: none; margin-top: 10px; font-size: 15px; }
        .btn-primary { background: var(--primary); }
        .btn-warning { background: var(--warning); }
        .btn-danger { background: var(--danger); }
        .btn-wa { background: var(--whatsapp); text-align: center; }
        .btn-close { background: #64748b; }

        /* --- FILTER --- */
        .filter-section { margin-bottom: 30px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { padding: 10px 18px; border-radius: 50px; border: none; background: white; cursor: pointer; font-weight: bold; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-btn.active { background: var(--primary); color: white; }

        /* --- KATALOG GRID --- */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0fdf4; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card h3 { padding: 12px; margin: 0; font-size: 12px; text-align: center; text-transform: uppercase; color: var(--text); line-height: 1.4; }

        /* --- MODAL (FIXED SCROLL) --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { 
            background: white; margin: 2vh auto; border-radius: 20px; 
            max-width: 480px; width: 92%; position: relative; 
            overflow-y: auto; max-height: 95vh; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
        }
        .modal-body { padding: 20px; }
        .modal-img { width: 100%; height: 280px; object-fit: contain; background: #f9f9f9; border-radius: 10px; }
        .modal-desc-area { white-space: pre-wrap; background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 14px; color: #334155; line-height: 1.7; border: 1px solid #e2e8f0; }

        @media (max-width: 600px) {
            .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container" onclick="activateAdminMode()">
        <img src="gmslogo.png" alt="Logo" class="main-logo">
        <h1>GMS_KATALOG BARANG</h1>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari nama barang..." onkeyup="searchProduct()">
    </div>

    <div id="adminPanel">
        <h3 id="formTitle" style="margin-top:0;">Tambah Produk Baru</h3>
        <div class="grid-form">
            <input type="text" id="p-name" placeholder="Nama Barang">
            <input type="text" id="p-img" placeholder="Nama File Gambar (contoh: adaptor.jpg)">
            <select id="p-cat">
                <option value="Pipa">Pipa</option>
                <option value="Aksesoris">Aksesoris</option>
                <option value="Fitting">Fitting</option>
            </select>
            <textarea id="p-desc" style="height: 100px;" placeholder="Tulis rincian harga di sini..."></textarea>
            <button id="saveBtn" class="btn btn-primary" onclick="addItem()">Simpan ke Database</button>
            <button id="cancelBtn" class="btn btn-danger" style="display:none;" onclick="resetForm()">Batal Edit</button>
            <button class="btn btn-warning" onclick="logoutAdmin()">Keluar Mode Admin</button>
        </div>
    </div>

    <div class="filter-section">
        <button class="filter-btn active" onclick="filterCat('Semua', this)">Semua</button>
        <button class="filter-btn" onclick="filterCat('Pipa', this)">Pipa</button>
        <button class="filter-btn" onclick="filterCat('Aksesoris', this)">Aksesoris</button>
        <button class="filter-btn" onclick="filterCat('Fitting', this)">Fitting</button>
    </div>

    <div id="catalog-grid" class="catalog-grid"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <img id="modalImg" class="modal-img" src="">
        <div class="modal-body">
            <h2 id="modalName" style="margin:0; color: var(--primary-dark); text-align:center;"></h2>
            <div id="modalDesc" class="modal-desc-area"></div>
            <a id="waBtn" href="#" target="_blank" class="btn btn-wa">💬 Tanya Admin / Order</a>
            <div id="adminActions" style="display:none; margin-top:15px; border-top:2px solid #eee; padding-top:10px;">
                <button class="btn btn-warning" onclick="editItem()">Edit Data</button>
                <button class="btn btn-danger" onclick="deleteItem()">Hapus Produk</button>
            </div>
            <button class="btn btn-close" onclick="closeModal()">Tutup</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI (GANTI SESUAI DATA ANDA) ---
    const NO_WHATSAPP = "628295977519"; 
    const SUPABASE_URL = 'https://lqoynorzujcmzyynxmbw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_eODBvHQjNMS1sZgw_1usHA_yO8YEjLg';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];
    let currentFilter = 'Semua';
    let searchQuery = "";
    let isAdmin = localStorage.getItem('gms_admin') === 'true';
    let clickCount = 0;
    let currentItemId = null;
    let isEditing = false;

    if (isAdmin) document.getElementById('adminPanel').style.display = "block";

    function activateAdminMode() {
        clickCount++;
        if (clickCount === 5) {
            const pin = prompt("Masukkan PIN Admin:");
            if (pin === "2020") {
                isAdmin = true;
                localStorage.setItem('gms_admin', 'true');
                document.getElementById('adminPanel').style.display = "block";
                alert("Mode Admin Aktif!");
            }
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 3000);
    }

    function logoutAdmin() {
        localStorage.removeItem('gms_admin');
        location.reload();
    }

    async function fetchData() {
    const { data, error } = await _supabase.from('products').select('*');
    if (!error) {
        // Pastikan kita menyimpan data ID dari database ke variabel local
        items = data; 
        render();
    }
}

function openModal(id) {
    // Pastikan ID yang diterima dikonversi ke tipe yang sama (Number)
    currentItemId = Number(id); 
    const item = items.find(i => Number(i.id) === currentItemId);
    
    if (item) {
        document.getElementById('modalImg').src = item.img;
        document.getElementById('modalName').innerText = item.name;
        document.getElementById('modalDesc').innerText = item.desc;
        document.getElementById('adminActions').style.display = isAdmin ? "block" : "none";
        document.getElementById('productModal').style.display = "block";
    }
}

    function searchProduct() {
        searchQuery = document.getElementById('searchInput').value.toLowerCase();
        render();
    }

    function render() {
        const container = document.getElementById('catalog-grid');
        container.innerHTML = "";
        
        // Logika Filter Kategori + Pencarian
        const filtered = items.filter(item => {
            const matchCat = currentFilter === 'Semua' || item.cat === currentFilter;
            const matchSearch = item.name.toLowerCase().includes(searchQuery);
            return matchCat && matchSearch;
        });

        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">Produk tidak ditemukan...</div>`;
            return;
        }
        
        filtered.forEach((item) => {
            container.innerHTML += `
                <div class="card" onclick="openModal('${item.id}')">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/300?text=Tanpa+Gambar'">
                    <h3>${item.name}</h3>
                </div>`;
        });
    }

    async function addItem() {
        const name = document.getElementById('p-name').value;
        const img = document.getElementById('p-img').value;
        const cat = document.getElementById('p-cat').value;
        const desc = document.getElementById('p-desc').value;

        if(!name || !img) return alert("Nama dan Gambar wajib diisi!");

        if (isEditing) {
            await _supabase.from('products').update({ name, img, cat, desc }).eq('id', currentItemId);
        } else {
            await _supabase.from('products').insert([{ name, img, cat, desc }]);
        }
        
        resetForm();
        fetchData();
        alert("Berhasil!");
    }

    function openModal(id) {
        currentItemId = id;
        const item = items.find(i => String(i.id) === String(id));
        
        if (item) {
            document.getElementById('modalImg').src = item.img;
            document.getElementById('modalName').innerText = item.name;
            document.getElementById('modalDesc').innerText = item.desc;
            document.getElementById('waBtn').href = `https://wa.me/${NO_WHATSAPP}?text=Halo, info stok: *${item.name}*`;
            document.getElementById('adminActions').style.display = isAdmin ? "block" : "none";
            document.getElementById('productModal').style.display = "block";
            document.body.style.overflow = 'hidden'; 
        }
    }

    function closeModal() {
        document.getElementById('productModal').style.display = "none";
        document.body.style.overflow = 'auto';
    }

    function editItem() {
        const item = items.find(i => String(i.id) === String(currentItemId));
        isEditing = true;
        document.getElementById('p-name').value = item.name;
        document.getElementById('p-img').value = item.img;
        document.getElementById('p-cat').value = item.cat;
        document.getElementById('p-desc').value = item.desc;
        document.getElementById('formTitle').innerText = "Edit Produk";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
        closeModal();
    }

    async function deleteItem() {
    // 1. Pastikan ID produk tersedia
    if (!currentItemId) {
        alert("Gagal menghapus: ID produk tidak ditemukan.");
        return;
    }

    // 2. Konfirmasi ulang ke pengguna
    if (confirm("Hapus produk ini secara permanen dari Database?")) {
        try {
            // 3. Eksekusi hapus di Supabase berdasarkan ID (pastikan dikonversi ke format yang benar)
            const { error } = await _supabase
                .from('products')
                .delete()
                .eq('id', currentItemId);

            if (error) {
                console.error("Detail Error Supabase:", error);
                alert("Gagal menghapus dari database: " + error.message);
            } else {
                alert("Produk berhasil dihapus!");
                closeModal(); // Tutup jendela detail
                fetchData();  // Segarkan daftar produk di layar
            }
        } catch (err) {
            console.error("Kesalahan Sistem:", err);
            alert("Terjadi kesalahan sistem saat menghapus.");
        }
    }
}

    function resetForm() {
        isEditing = false;
        ['p-name', 'p-img', 'p-desc'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('formTitle').innerText = "Tambah Produk Baru";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function filterCat(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    fetchData();
</script>
</body>
</html>
