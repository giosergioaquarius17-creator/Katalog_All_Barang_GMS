<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Pro - Hidden Admin</title>
    <style>
        :root {
            --primary: #16a34a; 
            --primary-dark: #15803d;
            --whatsapp: #25d366;
            --danger: #ef4444;
            --secondary: #64748b;
            --bg-gradient: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 100%);
            --text: #14532d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; padding: 20px; min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; }
        
        /* SEMBUNYIKAN PANEL ADMIN SECARA DEFAULT */
        #adminPanel { 
            display: none; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px);
            padding: 25px; border-radius: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(22, 163, 74, 0.1);
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* Tombol Hapus juga disembunyikan secara default */
        #deleteBtn { display: none; }

        h1 { text-align: center; color: var(--primary-dark); font-weight: 800; margin-bottom: 30px; cursor: pointer; user-select: none; }
        
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #bdf1d4; border-radius: 10px; box-sizing: border-box; font-family: inherit; }

        .btn { border: none; padding: 14px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; color: white; text-decoration: none; display: inline-block; text-align: center; }
        .btn-primary { background: var(--primary); width: 100%; }
        .btn-wa { background: var(--whatsapp); margin-top: 15px; width: 100%; box-sizing: border-box; }
        .btn-danger { background: var(--danger); margin-top: 20px; font-size: 12px; width: 100%; opacity: 0.8; }
        
        .admin-tools { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid rgba(22, 163, 74, 0.1); padding-top: 20px; }
        .btn-tool { background: var(--secondary); font-size: 11px; flex: 1; padding: 10px; }

        .filter-section { margin-bottom: 35px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .filter-btn { padding: 10px 22px; border-radius: 50px; border: none; background: white; color: var(--primary); cursor: pointer; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .filter-btn.active { background: var(--primary); color: white; transform: scale(1.05); }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.04); cursor: pointer; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 190px; object-fit: cover; }
        .card h3 { padding: 15px; margin: 0; font-size: 15px; text-align: center; color: var(--text); font-weight: 800; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(6, 78, 59, 0.6); backdrop-filter: blur(10px); }
        .modal-content { background: white; margin: 3vh auto; border-radius: 24px; max-width: 500px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 20px; cursor: pointer; color: #64748b; background: #f1f5f9; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .modal-body { padding: 30px; }
        .modal-img { width: 100%; height: 320px; object-fit: contain; background: #f0fdf4; }
        .modal-desc-area { white-space: pre-wrap; line-height: 1.7; color: #1e293b; background: #f8fafc; padding: 20px; border-radius: 15px; margin-top: 15px; font-size: 14px; border: 1px solid #e2e8f0; }
        .modal-badge { background: #dcfce7; color: var(--primary-dark); padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        #importFile { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 onclick="activateAdminMode()">Katalog Produk Interaktif</h1>

    <div id="adminPanel">
        <div class="grid-form">
            <input type="text" id="p-name" placeholder="Nama Barang">
            <input type="text" id="p-img" placeholder="Nama File Gambar">
            <select id="p-cat">
                <option value="Pipa">Pipa</option>
                <option value="Aksesoris Pipa">Aksesoris Pipa</option>
                <option value="Fitting">Fitting</option>
                <option value="Lainnya">Lainnya</option>
            </select>
            <textarea id="p-desc" class="full-width" style="height: 100px;" placeholder="Rincian harga & ukuran..."></textarea>
            <button class="btn btn-primary full-width" onclick="addItem()">Simpan ke Katalog</button>
            <div class="admin-tools">
                <button class="btn btn-tool" onclick="downloadBackup()">💾 Backup</button>
                <label for="importFile" class="btn btn-tool">📂 Restore</label>
                <input type="file" id="importFile" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div class="filter-section">
        <button class="filter-btn active" onclick="filterCat('Semua', this)">Semua</button>
        <button class="filter-btn" onclick="filterCat('Pipa', this)">Pipa</button>
        <button class="filter-btn" onclick="filterCat('Aksesoris Pipa', this)">Aksesoris</button>
        <button class="filter-btn" onclick="filterCat('Fitting', this)">Fitting</button>
    </div>

    <div id="catalog-grid" class="catalog-grid"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg" class="modal-img" src="">
        <div class="modal-body">
            <span id="modalCat" class="modal-badge"></span>
            <h2 id="modalName" style="margin: 15px 0 10px 0;"></h2>
            <div id="modalDesc" class="modal-desc-area"></div>
            <a id="waBtn" href="#" target="_blank" class="btn btn-wa">💬 Tanya Admin / Order</a>
            <button id="deleteBtn" class="btn btn-danger" onclick="deleteItem()">Hapus Produk</button>
        </div>
    </div>
</div>

<script>
    const WHATSAPP_NUMBER = "6282295977519"; 
    let items = JSON.parse(localStorage.getItem('catalog_db')) || [];
    let currentFilter = 'Semua';
    let isAdmin = false;
    let clickCount = 0;
    let currentItemIndex = null;

    // FUNGSI RAHASIA UNTUK MENGAKTIFKAN MODE ADMIN
    function activateAdminMode() {
        clickCount++;
        if (clickCount === 5) { // Klik judul 5 kali
            const pin = prompt("Masukkan PIN Keamanan:");
            if (pin === "2020") { // Ganti PIN sesuai keinginan Anda
                isAdmin = true;
                document.getElementById('adminPanel').style.display = "block";
                document.getElementById('deleteBtn').style.display = "block";
                alert("Mode Admin Aktif!");
            } else {
                alert("PIN Salah!");
                clickCount = 0;
            }
        }
        setTimeout(() => { clickCount = 0; }, 3000); // Reset hitungan jika jeda terlalu lama
    }

    function render() {
        const container = document.getElementById('catalog-grid');
        container.innerHTML = "";
        const data = currentFilter === 'Semua' ? items : items.filter(i => i.cat === currentFilter);
        data.forEach((item) => {
            const originalIndex = items.indexOf(item);
            container.innerHTML += `
                <div class="card" onclick="openModal(${originalIndex})">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/300?text=Gambar+Kosong'">
                    <h3>${item.name}</h3>
                </div>`;
        });
    }

    function addItem() {
        const name = document.getElementById('p-name').value;
        const img = document.getElementById('p-img').value;
        const cat = document.getElementById('p-cat').value;
        const desc = document.getElementById('p-desc').value;
        if(name && img) {
            items.push({ name, img, cat, desc });
            saveData();
            ['p-name', 'p-img', 'p-desc'].forEach(id => document.getElementById(id).value = "");
        }
    }

    function deleteItem() {
        if(confirm("Hapus produk ini secara permanen?")) {
            items.splice(currentItemIndex, 1);
            saveData();
            closeModal();
        }
    }

    function openModal(index) {
        currentItemIndex = index;
        const item = items[index];
        document.getElementById('modalImg').src = item.img;
        document.getElementById('modalName').innerText = item.name;
        document.getElementById('modalCat').innerText = item.cat;
        document.getElementById('modalDesc').innerText = item.desc || "Hubungi admin.";
        document.getElementById('waBtn').href = `https://wa.me/${WHATSAPP_NUMBER}?text=Halo, info untuk *${item.name}*`;
        
        // Tampilkan tombol hapus HANYA jika mode admin aktif
        document.getElementById('deleteBtn').style.display = isAdmin ? "block" : "none";
        document.getElementById('productModal').style.display = "block";
    }

    function filterCat(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function saveData() { localStorage.setItem('catalog_db', JSON.stringify(items)); render(); }
    function closeModal() { document.getElementById('productModal').style.display = "none"; }
    function downloadBackup() {
        const blob = new Blob([JSON.stringify(items)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "katalog.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = (event) => { items = JSON.parse(event.target.result); saveData(); };
        r.readAsText(e.target.files[0]);
    }
    window.onclick = (e) => { if (e.target == document.getElementById('productModal')) closeModal(); }
    render();
</script>
</body>
</html>
